name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "minhascontas",
            "version": "1.0.0",
            "private": true
          }
          EOF

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Set up Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.minhascontas.app",
            "appName": "Minhas Contas",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Build APK
        run: cd android && ./gradlew assembleDebug
        continue-on-error: false

      - name: Check APK exists
        run: ls -la android/app/build/outputs/apk/debug/ || echo "APK not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MinhasContas-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          tag: latest
          name: "Minhas Contas APK"
          artifacts: android/app/build/outputs/apk/debug/app-debug.apk
          artifactContentType: application/vnd.android.package-archive
          token: ${{ secrets.GITHUB_TOKEN }}
