name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || echo "Licenses OK"

      - name: Add Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Generate app icons from SVG
        run: |
          npm install sharp
          node -e "
          const sharp = require('sharp');
          const sizes = { mdpi:48, hdpi:72, xhdpi:96, xxhdpi:144, xxxhdpi:192 };
          const fgSizes = { mdpi:108, hdpi:162, xhdpi:216, xxhdpi:324, xxxhdpi:432 };
          const base = 'android/app/src/main/res';
          // Full icon: blue rounded rect with white letter
          const svg = Buffer.from('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"100\" height=\"100\"><rect width=\"100\" height=\"100\" rx=\"20\" fill=\"#1DA1F2\"/><text x=\"50\" y=\"50\" text-anchor=\"middle\" dy=\".35em\" font-size=\"55\" font-weight=\"bold\" font-family=\"sans-serif\" fill=\"white\">C</text></svg>');
          async function gen() {
            for (const [dir, sz] of Object.entries(sizes)) {
              await sharp(svg).resize(sz,sz).png().toFile(base+'/mipmap-'+dir+'/ic_launcher.png');
              await sharp(svg).resize(sz,sz).png().toFile(base+'/mipmap-'+dir+'/ic_launcher_round.png');
            }
            // Foreground (white C on transparent) for adaptive icons
            const fgSvg = Buffer.from('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"108\" height=\"108\"><text x=\"54\" y=\"54\" text-anchor=\"middle\" dy=\".35em\" font-size=\"52\" font-weight=\"bold\" font-family=\"sans-serif\" fill=\"white\">C</text></svg>');
            for (const [dir, sz] of Object.entries(fgSizes)) {
              await sharp(fgSvg).resize(sz,sz).png().toFile(base+'/mipmap-'+dir+'/ic_launcher_foreground.png');
            }
          }
          gen().then(() => console.log('Icons generated!'));
          "
          # Update background color for adaptive icon
          cat > android/app/src/main/res/values/ic_launcher_background.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#1DA1F2</color>
          </resources>
          XMLEOF

      - name: Fix status bar overlap (Android 15+ edge-to-edge)
        run: |
          # Disable edge-to-edge in theme
          sed -i 's|<item name="android:background">@null</item>|<item name="android:background">@null</item>\n        <item name="android:fitsSystemWindows">true</item>\n        <item name="android:windowFullscreen">false</item>\n        <item name="android:windowDrawsSystemBarBackgrounds">true</item>\n        <item name="android:statusBarColor">@android:color/transparent</item>|' android/app/src/main/res/values/styles.xml
          # Add fitsSystemWindows to splash theme
          sed -i 's|<item name="android:background">@drawable/splash</item>|<item name="android:background">@drawable/splash</item>\n        <item name="android:fitsSystemWindows">true</item>\n        <item name="android:windowFullscreen">false</item>|' android/app/src/main/res/values/styles.xml
          # Add fitsSystemWindows to layout
          sed -i 's|tools:context=".MainActivity">|android:fitsSystemWindows="true"\n    tools:context=".MainActivity">|' android/app/src/main/res/layout/activity_main.xml
          # Opt out of edge-to-edge in MainActivity
          sed -i 's|import com.getcapacitor.BridgeActivity;|import android.os.Bundle;\nimport androidx.core.view.WindowCompat;\nimport com.getcapacitor.BridgeActivity;|' android/app/src/main/java/com/crmfinanceiro/app/MainActivity.java
          sed -i 's|public class MainActivity extends BridgeActivity {}|public class MainActivity extends BridgeActivity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        WindowCompat.setDecorFitsSystemWindows(getWindow(), true);\n    }\n}|' android/app/src/main/java/com/crmfinanceiro/app/MainActivity.java

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/Minhas.Contas.apk"

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: CRM-Financeiro-APK
          path: android/app/build/outputs/apk/debug/Minhas.Contas.apk
          if-no-files-found: error

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --title "CRM Financeiro APK" --latest --notes "" 2>/dev/null || true
          gh release upload latest "android/app/build/outputs/apk/debug/Minhas.Contas.apk" --clobber
