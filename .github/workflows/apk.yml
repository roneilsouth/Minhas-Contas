name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || echo "Licenses OK"

      - name: Add Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Fix status bar overlap (Android 15+ edge-to-edge)
        run: |
          # Disable edge-to-edge in theme
          sed -i 's|<item name="android:background">@null</item>|<item name="android:background">@null</item>\n        <item name="android:fitsSystemWindows">true</item>\n        <item name="android:windowFullscreen">false</item>\n        <item name="android:windowDrawsSystemBarBackgrounds">true</item>\n        <item name="android:statusBarColor">@android:color/transparent</item>|' android/app/src/main/res/values/styles.xml
          # Add fitsSystemWindows to splash theme
          sed -i 's|<item name="android:background">@drawable/splash</item>|<item name="android:background">@drawable/splash</item>\n        <item name="android:fitsSystemWindows">true</item>\n        <item name="android:windowFullscreen">false</item>|' android/app/src/main/res/values/styles.xml
          # Add fitsSystemWindows to layout
          sed -i 's|tools:context=".MainActivity">|android:fitsSystemWindows="true"\n    tools:context=".MainActivity">|' android/app/src/main/res/layout/activity_main.xml
          # Opt out of edge-to-edge in MainActivity
          sed -i 's|import com.getcapacitor.BridgeActivity;|import android.os.Bundle;\nimport androidx.core.view.WindowCompat;\nimport com.getcapacitor.BridgeActivity;|' android/app/src/main/java/com/crmfinanceiro/app/MainActivity.java
          sed -i 's|public class MainActivity extends BridgeActivity {}|public class MainActivity extends BridgeActivity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        WindowCompat.setDecorFitsSystemWindows(getWindow(), true);\n    }\n}|' android/app/src/main/java/com/crmfinanceiro/app/MainActivity.java

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CRM-Financeiro-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create/Update Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          tag: latest
          name: "CRM Financeiro APK"
          artifacts: android/app/build/outputs/apk/debug/app-debug.apk
          artifactContentType: application/vnd.android.package-archive
          token: ${{ secrets.GITHUB_TOKEN }}
